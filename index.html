<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>SISTEMA JDP SECURE</title>
    <style>
        body { background:#020617; color:#fff; font-family:monospace; margin:0; overflow:hidden; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; }
        #term { width:80%; text-align:left; font-size:18px; color:#06b6d4; text-shadow:0 0 5px #06b6d4; }
        #muralha { display:none; text-align:center; animation: fadeIn 1.5s; }
        .logo { width:150px; filter:drop-shadow(0 0 10px #fde047); margin-bottom:20px; }
        .btn-w { display:inline-block; margin-top:20px; padding:15px 30px; background:#25d366; color:#fff; text-decoration:none; border-radius:5px; font-weight:bold; font-family:sans-serif; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    </style>
</head>
<body>
    <div id="term"></div>
    <div id="muralha">
        <img class="logo" src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1777000164292_icon_512_1_.png">
        <h2 style="color:#fde047">ACESSO INDISPONÍVEL</h2>
        <p>LICENÇA EXPIRADA OU PROBLEMA DE DIRETRIZ DE DOMÍNIO.</p>
        <p>ESTE SISTEMA EXECUTARÁ APENAS EM: http://jdpsistemas.com.br/</p>
        <a href="https://wa.me/5592984846058" class="btn-w">FALAR COM MESTRE JOSÉ</a>
    </div>
    <script>
        const C = { id:'DONY_BURGUER_S_MAGNIFICO6', k:'RE9OWV9CVVJHVUVS', d:'jdpsistemas.com.br' };
        const t = document.getElementById('term');
        const m = document.getElementById('muralha');
        
        const msg = [
            "> INICIALIZANDO MÁQUINA JDP v15.0 SUPREME...",
            "> VERIFICANDO ALINHAMENTO DOS PISTÕES...",
            "> CONECTANDO AO SERVIDOR DE LICENÇAS JDP...",
            "> CONEXÃO ESTÁVEL DETECTADA OU CACHE ATIVO..."
        ];
        let l=0, c=0;

        function type() {
            if(l < msg.length) {
                if(c < msg[l].length) { t.innerHTML += msg[l].charAt(c); c++; setTimeout(type, 15); }
                else { t.innerHTML += "<br>"; l++; c=0; setTimeout(type, 200); }
            } else {
                setTimeout(() => { t.style.display='none'; m.style.display='block'; }, 800);
            }
        }

        // MOTOR DE EXECUÇÃO SUPREMO ANTI-TELA-PRETA (TRI-REDUNDANTE)
        function executarPayload(payloadBase64) {
            try {
                let htmlDecodificado;
                try {
                    // Método 1: UTF-8 Escape (Padrão de Alta Fidelidade)
                    htmlDecodificado = decodeURIComponent(escape(atob(payloadBase64)));
                } catch(err) {
                    try {
                        // Método 2: Decodificação Base64 Direta (Fallback)
                        htmlDecodificado = atob(payloadBase64);
                    } catch(err2) {
                        // Método 3: Decodificação URI Pura
                        htmlDecodificado = decodeURIComponent(payloadBase64);
                    }
                }
                
                document.open(); 
                document.write(htmlDecodificado); 
                document.close();
                return true;
            } catch(e) {
                console.error("Erro Crítico de Injeção:", e);
                return false;
            }
        }

        async function validar() {
            const urlParams = new URLSearchParams(window.location.search);
            const bypassJose = urlParams.get('senha') === 'PrincesaDiamante' || urlParams.get('key') === 'PrincesaDiamante';
            
            // Aceita o domínio mestre e qualquer subdomínio dele
            const hostname = window.location.hostname;
            const isDominioValido = hostname === C.d || hostname.endsWith('.' + C.d) || hostname === 'localhost' || hostname === '127.0.0.1';

            if(!bypassJose && !isDominioValido) {
                 type();
                 return;
            }

            const cacheLocal = localStorage.getItem('jdp_payload_' + C.id);
            const statusLocal = localStorage.getItem('jdp_status_' + C.id);

            // CONTINGÊNCIA OFFLINE IMEDIATA
            if (!navigator.onLine) {
                if (cacheLocal && statusLocal === 'ativo') {
                    executarPayload(cacheLocal);
                    return;
                } else {
                    type();
                    return;
                }
            }
            
            // SE ESTIVER ONLINE: Sincroniza com o GitHub do Criador
            try {
                const r = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/clientes.json?t='+Date.now(), { cache: 'no-store' });
                const d = await r.json();
                const u = d.find(i => i.id === C.id);
                
                if(u && u.status === 'ativo') {
                    const r2 = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/' + u.path + 'payload.json?t='+Date.now(), { cache: 'no-store' });
                    const p = await r2.json();
                    
                    // Alimenta o cofre de persistência local
                    localStorage.setItem('jdp_payload_' + C.id, p.payload);
                    localStorage.setItem('jdp_status_' + C.id, 'ativo');
                    
                    executarPayload(p.payload);
                } else {
                    // Revoga acessos locais se o status for alterado no repositório
                    localStorage.removeItem('jdp_payload_' + C.id);
                    localStorage.removeItem('jdp_status_' + C.id);
                    type();
                }
            } catch(e) { 
                // Se houver oscilação de rede durante a requisição, usa o cache local
                if (cacheLocal && statusLocal === 'ativo') {
                    executarPayload(cacheLocal);
                } else {
                    type(); 
                }
            }
        }

        // HEARTBEAT DE VERIFICAÇÃO EM TEMPO REAL (A cada 5 segundos)
        setInterval(() => {
            if (navigator.onLine) {
                fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/clientes.json?t='+Date.now(), { cache: 'no-store' })
                .then(r => r.json())
                .then(d => {
                    const u = d.find(i => i.id === C.id);
                    if (u && u.status === 'ativo') {
                        localStorage.setItem('jdp_status_' + C.id, 'ativo');
                    } else {
                        localStorage.removeItem('jdp_payload_' + C.id);
                        localStorage.removeItem('jdp_status_' + C.id);
                        window.location.reload();
                    }
                }).catch(e => {});
            }
        }, 5000);

        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        validar();
    </script>
</body>
</html>
